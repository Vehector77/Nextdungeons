name: NextDungeons
version: 2.0.0
description: Advanced dungeon system with classes, quests, waves, and more
author: Vehector77
main: com.nextdungeons.plugin.NextDungeons
api-version: "1.21"

softdepend:
  - Vault
  - PlaceholderAPI
  - MythicMobs
  - FastAsyncWorldEdit
  - CMI
  - Citizens

commands:
  dungeons:
    description: Open dungeons menu or enter a dungeon
    usage: /dungeons [dungeon_id]
    permission: nextdungeons.use
  dungeonadmin:
    description: Dungeon administration commands
    usage: /dungeonadmin <action>
    permission: nextdungeons.admin
  party:
    description: Party management commands
    usage: /party <action>
    permission: nextdungeons.party
  class:
    description: Class management commands
    usage: /class <action>
    permission: nextdungeons.use
  quest:
    description: Quest management commands
    usage: /quest <action>
    permission: nextdungeons.use
  leaderboard:
    description: View leaderboards
    usage: /leaderboard [type] [page]
    permission: nextdungeons.use

permissions:
  nextdungeons.*:
    description: All NextDungeons permissions
    default: false
    children:
      nextdungeons.use: true
      nextdungeons.party: true
      nextdungeons.admin: true
  nextdungeons.use:
    description: Use dungeons
    default: true
  nextdungeons.party:
    description: Use party system
    default: true
  nextdungeons.admin:
    description: Admin commands
    default: op
  nextdungeons.class.*:
    description: All class permissions
    default: true